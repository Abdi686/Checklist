<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Cater - 24-Hour Shift Safety & Operational Ledger</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: #fff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a365d;
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }
        h2 {
            color: #4a5568;
            text-align: center;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 400;
        }
        .section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input[type="text"], input[type="date"], input[type="time"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .checkbox-group input[type="checkbox"] {
            margin-top: 4px;
            margin-right: 12px;
            transform: scale(1.2);
        }
        .checkbox-group label {
            font-weight: 500;
            cursor: pointer;
        }
        button {
            width: 100%;
            background-color: #2b6cb0;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2c5282;
        }
        .qr-placeholder {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e0;
            color: #718096;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Go Cater</h1>
    <h2>24-Hour Shift Safety & Operational Ledger</h2>

    <!-- Metadata Section -->
    <div class="section">
        <div class="form-group">
            <label for="staffName">Staff Member Name</label>
            <input type="text" id="staffName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="shiftDate">Date</label>
            <input type="date" id="shiftDate">
        </div>
        <div class="form-group">
            <label for="timeStart">Time Start</label>
            <input type="time" id="timeStart">
        </div>
        <div class="form-group">
            <label for="shiftSelect">Select Your Shift (24H Coverage)</label>
            <select id="shiftSelect">
                <option value="">-- Choose Shift --</option>
                <option value="morning">Morning Shift (06:00 - 14:00) [Opening Checklist]</option>
                <option value="afternoon">Afternoon Shift (14:00 - 22:00) [Mid-Day Checklist]</option>
                <option value="night">Night Shift (22:00 - 06:00) [Closing Checklist]</option>
            </select>
        </div>
    </div>

    <!-- Core Checks Section -->
    <div class="section">
        <div class="section-title">Core Shift Checks</div>
        <div class="checkbox-group">
            <input type="checkbox" id="check1">
            <label for="check1">Fridge & Freezer Temps Logged & OK (Freezers down to -18°C)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="check2">
            <label for="check2">Raw/Cooked Food Separation Verified</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="check3">
            <label for="check3">Handwashing Stations Stocked & Clean</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="check4">
            <label for="check4">Waste Managed & Bins Emptied</label>
        </div>
    </div>

    <!-- Opening & Closing Specifics -->
    <div class="section">
        <div class="section-title">Opening & Closing Specifics</div>
        <div class="checkbox-group">
            <input type="checkbox" id="openCheck">
            <label for="openCheck">Opening Procedures Met (Equipment on, Prep ready)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="closeCheck">
            <label for="closeCheck">Closing Procedures Met (Deep clean, Lines off, Locked)</label>
        </div>
    </div>

    <!-- Handover Notes -->
    <div class="section">
        <div class="section-title">Handover Notes / Discrepancies</div>
        <textarea id="notes" rows="4" placeholder="Enter details of any equipment faults, temperature drops, or stock issues..."></textarea>
    </div>

    <!-- Submit Action -->
    <button onclick="alert('Report Compiled! Ready to email.')">Send Catering Report via Email</button>

    <div class="qr-placeholder">
        <p><strong>Scan to Open This Catering Checklist (Live)</strong></p>
        <div style="background:#edf2f7; width:100px; height:100px; margin:10px auto; display:flex; align-items:center; justify-content:center; border: 1px solid #cbd5e0; border-radius:4px; font-size:10px; color:#a0aec0;">QR CODE</div>
    </div>
</div>

</body>
</html>
